<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE MONITOR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --panel: #0d1117; --border: #1a2332;
    --accent: #00ff88; --accent2: #00b4ff; --warn: #ff6b35;
    --text: #c9d1d9; --dim: #4a5568; --glow: 0 0 20px rgba(0,255,136,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px); pointer-events:none; z-index:0; }
  .header { padding:24px 40px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,rgba(0,255,136,0.05),transparent); }
  .logo { font-family:'Rajdhani',sans-serif; font-weight:700; font-size:28px; letter-spacing:8px; color:var(--accent); text-shadow:var(--glow); }
  .logo span { color:var(--accent2); }
  .status-bar { display:flex; align-items:center; gap:20px; font-size:12px; color:var(--dim); }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .clock { color:var(--accent2); font-size:13px; }
  .main { padding:30px 40px; position:relative; z-index:1; }
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
  .stat-card { background:var(--panel); border:1px solid var(--border); padding:20px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); }
  .stat-card.blue::before { background:var(--accent2); }
  .stat-card.orange::before { background:var(--warn); }
  .stat-label { font-size:10px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; margin-bottom:8px; }
  .stat-value { font-family:'Rajdhani',sans-serif; font-size:42px; font-weight:700; color:var(--accent); line-height:1; }
  .stat-card.blue .stat-value { color:var(--accent2); }
  .stat-card.orange .stat-value { color:var(--warn); }
  .panel { background:var(--panel); border:1px solid var(--border); margin-bottom:20px; }
  .panel-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; font-size:11px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
  .panel-header .accent { color:var(--accent); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:12px 20px; font-size:10px; letter-spacing:2px; color:var(--dim); text-transform:uppercase; border-bottom:1px solid var(--border); }
  td { padding:14px 20px; border-bottom:1px solid rgba(26,35,50,0.5); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(0,255,136,0.03); }
  .status-badge { display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:3px 10px; border-radius:2px; }
  .status-badge.online { background:rgba(0,255,136,0.1); color:var(--accent); border:1px solid rgba(0,255,136,0.3); }
  .status-badge.offline { background:rgba(255,107,53,0.1); color:var(--warn); border:1px solid rgba(255,107,53,0.3); }
  .status-badge::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; }
  .status-badge.online::before { animation:pulse 1.5s infinite; }
  .hostname { color:var(--accent2); font-weight:bold; }
  .ip { color:var(--dim); font-size:12px; }
  .platform { font-size:11px; padding:2px 8px; background:rgba(0,180,255,0.08); border:1px solid rgba(0,180,255,0.2); color:var(--accent2); display:inline-block; }
  .empty-state { padding:60px 20px; text-align:center; color:var(--dim); }
  .empty-state .icon { font-size:40px; margin-bottom:12px; opacity:0.3; }
  .empty-state p { font-size:13px; letter-spacing:2px; }
  .log-area { padding:16px 20px; font-size:12px; max-height:180px; overflow-y:auto; color:var(--dim); line-height:1.8; }
  .log-area::-webkit-scrollbar { width:4px; }
  .log-area::-webkit-scrollbar-track { background:var(--bg); }
  .log-area::-webkit-scrollbar-thumb { background:var(--border); }
  .log-line { display:flex; gap:12px; }
  .log-time { color:var(--dim); min-width:85px; }
  .log-msg.connect { color:var(--accent); }
  .log-msg.disconnect { color:var(--warn); }
  .log-msg.info { color:var(--accent2); }
  .scan-line { position:fixed; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.2; animation:scan 4s linear infinite; pointer-events:none; z-index:999; }
  @keyframes scan { 0%{top:-2px} 100%{top:100vh} }
</style>
</head>
<body>
<div class="scan-line"></div>
<div class="header">
  <div class="logo">NODE<span>MONITOR</span></div>
  <div class="status-bar">
    <div class="live-dot"></div><span>LIVE</span>
    <span style="color:var(--border)">|</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>
<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Connected</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat-card blue"><div class="stat-label">Online Now</div><div class="stat-value" id="stat-online">0</div></div>
    <div class="stat-card orange"><div class="stat-label">Offline</div><div class="stat-value" id="stat-offline">0</div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span>CONNECTED <span class="accent">NODES</span></span><span id="last-update">WAITING...</span></div>
    <div id="table-container">
      <div class="empty-state"><div class="icon">⬡</div><p>NO NODES CONNECTED — AWAITING SIGNAL</p></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header"><span>ACTIVITY <span class="accent">LOG</span></span></div>
    <div class="log-area" id="log"></div>
  </div>
</div>
<script>
  const socket = io();
  let clients = [];
  function clock(){ document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }
  setInterval(clock,1000); clock();
  function addLog(msg,type='info'){
    const log=document.getElementById('log');
    const time=new Date().toTimeString().slice(0,8);
    const line=document.createElement('div');
    line.className='log-line';
    line.innerHTML=`<span class="log-time">[${time}]</span><span class="log-msg ${type}">${msg}</span>`;
    log.appendChild(line); log.scrollTop=log.scrollHeight;
    while(log.children.length>50) log.removeChild(log.firstChild);
  }
  function timeSince(iso){
    const diff=Math.floor((Date.now()-new Date(iso))/1000);
    if(diff<60) return diff+'s ago';
    if(diff<3600) return Math.floor(diff/60)+'m ago';
    return Math.floor(diff/3600)+'h ago';
  }
  function render(data){
    const prev=Object.fromEntries(clients.map(c=>[c.id,c.status]));
    clients=data;
    data.forEach(c=>{
      const was=prev[c.id];
      if(!was) addLog(`NEW NODE: ${c.hostname} (${c.ip}) connected`,'connect');
      else if(was==='online'&&c.status==='offline') addLog(`NODE OFFLINE: ${c.hostname}`,'disconnect');
      else if(was==='offline'&&c.status==='online') addLog(`NODE BACK: ${c.hostname}`,'connect');
    });
    document.getElementById('stat-total').textContent=data.length;
    document.getElementById('stat-online').textContent=data.filter(c=>c.status==='online').length;
    document.getElementById('stat-offline').textContent=data.filter(c=>c.status==='offline').length;
    document.getElementById('last-update').textContent='UPDATED '+new Date().toTimeString().slice(0,8);
    const container=document.getElementById('table-container');
    if(!data.length){ container.innerHTML=`<div class="empty-state"><div class="icon">⬡</div><p>NO NODES CONNECTED — AWAITING SIGNAL</p></div>`; return; }
    container.innerHTML=`<table><thead><tr><th>Hostname</th><th>IP</th><th>Username</th><th>Platform</th><th>Connected</th><th>Last Seen</th><th>Status</th></tr></thead><tbody>${data.map(c=>`<tr><td class="hostname">${c.hostname}</td><td class="ip">${c.ip}</td><td>${c.username}</td><td><span class="platform">${c.platform}</span></td><td style="font-size:12px;color:var(--dim)">${new Date(c.connected_at).toTimeString().slice(0,8)}</td><td style="font-size:12px;color:var(--dim)">${timeSince(c.last_seen)}</td><td><span class="status-badge ${c.status}">${c.status.toUpperCase()}</span></td></tr>`).join('')}</tbody></table>`;
  }
  socket.on('connect',()=>{ addLog('Dashboard connected to server','info'); socket.emit('request_clients'); });
  socket.on('client_update',data=>render(data.clients||[]));
  socket.on('disconnect',()=>addLog('Lost connection to server','disconnect'));
</script>
</body>
</html>
