<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE MONITOR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c10;--panel:#0d1117;--border:#1a2332;
    --accent:#00ff88;--accent2:#00b4ff;--warn:#ff6b35;
    --text:#c9d1d9;--dim:#4a5568;--glow:0 0 20px rgba(0,255,136,0.3);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px);pointer-events:none;z-index:0;}
  .header{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(0,255,136,0.05),transparent);position:relative;z-index:1;}
  .logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:26px;letter-spacing:8px;color:var(--accent);text-shadow:var(--glow);}
  .logo span{color:var(--accent2);}
  .status-bar{display:flex;align-items:center;gap:20px;font-size:12px;color:var(--dim);}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .clock{color:var(--accent2);font-size:13px;}
  .main{padding:24px 40px;position:relative;z-index:1;}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
  .stat-card{background:var(--panel);border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
  .stat-card.blue::before{background:var(--accent2);}
  .stat-card.orange::before{background:var(--warn);}
  .stat-label{font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
  .stat-value{font-family:'Rajdhani',sans-serif;font-size:40px;font-weight:700;color:var(--accent);line-height:1;}
  .stat-card.blue .stat-value{color:var(--accent2);}
  .stat-card.orange .stat-value{color:var(--warn);}
  .panel{background:var(--panel);border:1px solid var(--border);margin-bottom:20px;}
  .panel-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
  .panel-header .accent{color:var(--accent);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;padding:10px 20px;font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border);}
  td{padding:12px 20px;border-bottom:1px solid rgba(26,35,50,0.5);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr.clickable:hover td{background:rgba(0,255,136,0.05);cursor:pointer;}
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:3px 10px;border-radius:2px;}
  .status-badge.online{background:rgba(0,255,136,0.1);color:var(--accent);border:1px solid rgba(0,255,136,0.3);}
  .status-badge.offline{background:rgba(255,107,53,0.1);color:var(--warn);border:1px solid rgba(255,107,53,0.3);}
  .status-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;}
  .status-badge.online::before{animation:pulse 1.5s infinite;}
  .hostname{color:var(--accent2);font-weight:bold;}
  .ip{color:var(--dim);font-size:12px;}
  .platform{font-size:11px;padding:2px 8px;background:rgba(0,180,255,0.08);border:1px solid rgba(0,180,255,0.2);color:var(--accent2);display:inline-block;}
  .view-btn{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--accent);padding:4px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;}
  .view-btn:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 10px rgba(0,255,136,0.2);}
  .view-btn:disabled{opacity:0.3;cursor:not-allowed;}
  .empty-state{padding:50px 20px;text-align:center;color:var(--dim);}
  .empty-state .icon{font-size:36px;margin-bottom:12px;opacity:0.3;}
  .empty-state p{font-size:13px;letter-spacing:2px;}
  .log-area{padding:14px 20px;font-size:12px;max-height:150px;overflow-y:auto;color:var(--dim);line-height:1.8;}
  .log-area::-webkit-scrollbar{width:4px;}
  .log-area::-webkit-scrollbar-track{background:var(--bg);}
  .log-area::-webkit-scrollbar-thumb{background:var(--border);}
  .log-line{display:flex;gap:12px;}
  .log-time{color:var(--dim);min-width:85px;}
  .log-msg.connect{color:var(--accent);}
  .log-msg.disconnect{color:var(--warn);}
  .log-msg.info{color:var(--accent2);}
  .scan-line{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.15;animation:scan 4s linear infinite;pointer-events:none;z-index:9999;}
  @keyframes scan{0%{top:-2px}100%{top:100vh}}

  /* ── VIEWER MODAL ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:1000;flex-direction:column;}
  .modal-overlay.open{display:flex;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
  .modal-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:4px;}
  .modal-controls{display:flex;align-items:center;gap:16px;}
  .toggle-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);}
  .toggle-label{letter-spacing:1px;}
  .toggle{position:relative;width:44px;height:22px;cursor:pointer;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;background:#1a2332;border:1px solid var(--border);border-radius:2px;transition:0.2s;}
  .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--dim);transition:0.2s;}
  input:checked + .toggle-slider{background:rgba(0,255,136,0.15);border-color:var(--accent);}
  input:checked + .toggle-slider:before{background:var(--accent);transform:translateX(22px);box-shadow:0 0 6px var(--accent);}
  .close-btn{background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);color:var(--warn);padding:6px 16px;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:2px;}
  .close-btn:hover{background:rgba(255,107,53,0.2);}
  .modal-body{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
  .screen-container{position:relative;max-width:100%;max-height:100%;}
  #screen-canvas{display:block;max-width:100%;max-height:calc(100vh - 120px);border:1px solid var(--border);cursor:default;image-rendering:auto;}
  #screen-canvas.mouse-active{cursor:none;}
  .no-stream{text-align:center;color:var(--dim);}
  .no-stream .ns-icon{font-size:48px;opacity:0.2;margin-bottom:16px;}
  .no-stream p{font-size:13px;letter-spacing:2px;}
  .cursor-dot{position:absolute;width:12px;height:12px;border:2px solid var(--accent);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);display:none;box-shadow:0 0 8px var(--accent);z-index:10;}
  .modal-status{padding:8px 20px;background:var(--panel);border-top:1px solid var(--border);font-size:11px;color:var(--dim);display:flex;gap:20px;flex-shrink:0;}
  .modal-status span{display:flex;align-items:center;gap:6px;}
  .kbd-input{position:fixed;opacity:0;pointer-events:none;top:0;left:0;}
</style>
</head>
<body>
<div class="scan-line"></div>

<div class="header">
  <div class="logo">NODE<span>MONITOR</span></div>
  <div class="status-bar">
    <div class="live-dot"></div><span>LIVE</span>
    <span style="color:var(--border)">|</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat-card blue"><div class="stat-label">Online</div><div class="stat-value" id="stat-online">0</div></div>
    <div class="stat-card orange"><div class="stat-label">Offline</div><div class="stat-value" id="stat-offline">0</div></div>
  </div>
  <div class="panel">
    <div class="panel-header"><span>CONNECTED <span class="accent">NODES</span></span><span id="last-update">WAITING...</span></div>
    <div id="table-container">
      <div class="empty-state"><div class="icon">⬡</div><p>NO NODES CONNECTED</p></div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header"><span>ACTIVITY <span class="accent">LOG</span></span></div>
    <div class="log-area" id="log"></div>
  </div>
</div>

<!-- VIEWER MODAL -->
<div class="modal-overlay" id="viewer-modal">
  <div class="modal-header">
    <div class="modal-title" id="modal-title">REMOTE VIEW</div>
    <div class="modal-controls">
      <div class="toggle-wrap">
        <span class="toggle-label" id="mouse-label">Mouse: OFF</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-mouse" onchange="toggleMouse(this)">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="kbd-label">Keyboard: OFF</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-kbd" onchange="toggleKbd(this)">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button class="close-btn" onclick="closeViewer()">✕ CLOSE</button>
    </div>
  </div>
  <div class="modal-body">
    <div id="no-stream" class="no-stream">
      <div class="ns-icon">📡</div>
      <p>WAITING FOR SCREEN STREAM...</p>
    </div>
    <div class="screen-container" id="screen-container" style="display:none">
      <canvas id="screen-canvas"></canvas>
      <div class="cursor-dot" id="cursor-dot"></div>
    </div>
  </div>
  <div class="modal-status">
    <span>FPS: <span id="fps-counter">0</span></span>
    <span>Resolution: <span id="res-info">--</span></span>
    <span>Target: <span id="target-info" style="color:var(--accent2)">--</span></span>
  </div>
</div>

<input type="text" class="kbd-input" id="kbd-input" autocomplete="off">

<script>
const socket = io();
let clients = [];
let activeClientId = null;
let mouseEnabled = false;
let kbdEnabled = false;
let frameCount = 0;
let lastFpsTime = Date.now();

// Clock
setInterval(() => { document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

function addLog(msg, type='info') {
  const log = document.getElementById('log');
  const time = new Date().toTimeString().slice(0,8);
  const d = document.createElement('div');
  d.className = 'log-line';
  d.innerHTML = `<span class="log-time">[${time}]</span><span class="log-msg ${type}">${msg}</span>`;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  while (log.children.length > 60) log.removeChild(log.firstChild);
}

function timeSince(iso) {
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}

function render(data) {
  const prev = Object.fromEntries(clients.map(c => [c.id, c.status]));
  clients = data;
  data.forEach(c => {
    const was = prev[c.id];
    if (!was) addLog(`NEW NODE: ${c.hostname} (${c.ip})`, 'connect');
    else if (was==='online' && c.status==='offline') addLog(`OFFLINE: ${c.hostname}`, 'disconnect');
    else if (was==='offline' && c.status==='online') addLog(`BACK ONLINE: ${c.hostname}`, 'connect');
  });
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-online').textContent = data.filter(c=>c.status==='online').length;
  document.getElementById('stat-offline').textContent = data.filter(c=>c.status==='offline').length;
  document.getElementById('last-update').textContent = 'UPDATED ' + new Date().toTimeString().slice(0,8);

  const container = document.getElementById('table-container');
  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">⬡</div><p>NO NODES CONNECTED</p></div>`;
    return;
  }
  container.innerHTML = `<table><thead><tr>
    <th>Hostname</th><th>IP</th><th>Username</th><th>Platform</th><th>Last Seen</th><th>Status</th><th>Action</th>
  </tr></thead><tbody>${data.map(c=>`
    <tr class="clickable">
      <td class="hostname">${c.hostname}</td>
      <td class="ip">${c.ip}</td>
      <td>${c.username}</td>
      <td><span class="platform">${c.platform}</span></td>
      <td style="font-size:12px;color:var(--dim)">${timeSince(c.last_seen)}</td>
      <td><span class="status-badge ${c.status}">${c.status.toUpperCase()}</span></td>
      <td><button class="view-btn" onclick="openViewer('${c.id}','${c.hostname}')" ${c.status==='offline'?'disabled':''}>▶ VIEW</button></td>
    </tr>`).join('')}
  </tbody></table>`;
}

// ── VIEWER ──────────────────────────────────────────────────────

function openViewer(clientId, hostname) {
  activeClientId = clientId;
  document.getElementById('modal-title').textContent = `REMOTE — ${hostname.toUpperCase()}`;
  document.getElementById('target-info').textContent = hostname;
  document.getElementById('viewer-modal').classList.add('open');
  document.getElementById('no-stream').style.display = 'block';
  document.getElementById('screen-container').style.display = 'none';
  document.getElementById('toggle-mouse').checked = false;
  document.getElementById('toggle-kbd').checked = false;
  mouseEnabled = false; kbdEnabled = false;
  updateToggleLabels();
  socket.emit('viewer_watch', { client_id: clientId });
  addLog(`Opened viewer for ${hostname}`, 'info');
}

function closeViewer() {
  if (activeClientId) socket.emit('viewer_unwatch', { client_id: activeClientId });
  activeClientId = null;
  mouseEnabled = false; kbdEnabled = false;
  document.getElementById('viewer-modal').classList.remove('open');
  document.getElementById('screen-canvas').classList.remove('mouse-active');
  document.getElementById('cursor-dot').style.display = 'none';
}

function toggleMouse(el) {
  mouseEnabled = el.checked;
  updateToggleLabels();
  const canvas = document.getElementById('screen-canvas');
  if (mouseEnabled) canvas.classList.add('mouse-active');
  else canvas.classList.remove('mouse-active');
  document.getElementById('cursor-dot').style.display = mouseEnabled ? 'block' : 'none';
}

function toggleKbd(el) {
  kbdEnabled = el.checked;
  updateToggleLabels();
  if (kbdEnabled) document.getElementById('kbd-input').focus();
}

function updateToggleLabels() {
  document.getElementById('mouse-label').textContent = `Mouse: ${mouseEnabled ? 'ON' : 'OFF'}`;
  document.getElementById('kbd-label').textContent = `Keyboard: ${kbdEnabled ? 'ON' : 'OFF'}`;
  document.getElementById('mouse-label').style.color = mouseEnabled ? 'var(--accent)' : 'var(--dim)';
  document.getElementById('kbd-label').style.color = kbdEnabled ? 'var(--accent)' : 'var(--dim)';
}

// ── Screen rendering ────────────────────────────────────────────

socket.on('screen_frame', (data) => {
  if (data.client_id !== activeClientId) return;
  const canvas = document.getElementById('screen-canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    if (canvas.width !== img.width || canvas.height !== img.height) {
      canvas.width = img.width; canvas.height = img.height;
      document.getElementById('res-info').textContent = `${img.width}×${img.height}`;
    }
    ctx.drawImage(img, 0, 0);
    document.getElementById('no-stream').style.display = 'none';
    document.getElementById('screen-container').style.display = 'block';
  };
  img.src = 'data:image/jpeg;base64,' + data.frame;
  frameCount++;
  const now = Date.now();
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps-counter').textContent = frameCount;
    frameCount = 0; lastFpsTime = now;
  }
});

// ── Mouse forwarding ────────────────────────────────────────────

const canvas = document.getElementById('screen-canvas');
const cursorDot = document.getElementById('cursor-dot');

canvas.addEventListener('mousemove', (e) => {
  if (!mouseEnabled || !activeClientId) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.round((e.clientX - rect.left) * scaleX);
  const y = Math.round((e.clientY - rect.top) * scaleY);
  socket.emit('mouse_move', { client_id: activeClientId, x, y });
  // Show cursor dot
  cursorDot.style.left = (e.clientX - rect.left) + 'px';
  cursorDot.style.top = (e.clientY - rect.top) + 'px';
});

canvas.addEventListener('click', (e) => {
  if (!mouseEnabled || !activeClientId) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  socket.emit('mouse_click', {
    client_id: activeClientId,
    x: Math.round((e.clientX - rect.left) * scaleX),
    y: Math.round((e.clientY - rect.top) * scaleY),
    button: 'left'
  });
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (!mouseEnabled || !activeClientId) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  socket.emit('mouse_click', {
    client_id: activeClientId,
    x: Math.round((e.clientX - rect.left) * scaleX),
    y: Math.round((e.clientY - rect.top) * scaleY),
    button: 'right'
  });
});

// ── Keyboard forwarding ─────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (!kbdEnabled || !activeClientId) return;
  if (!document.getElementById('viewer-modal').classList.contains('open')) return;
  e.preventDefault();
  socket.emit('key_press', { client_id: activeClientId, key: e.key });
});

// ── Socket events ───────────────────────────────────────────────

socket.on('connect', () => { addLog('Dashboard connected', 'info'); socket.emit('request_clients'); });
socket.on('client_update', (data) => render(data.clients || []));
socket.on('disconnect', () => addLog('Lost server connection', 'disconnect'));

// Close modal on ESC
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !kbdEnabled) closeViewer(); });
</script>
</body>
</html>
